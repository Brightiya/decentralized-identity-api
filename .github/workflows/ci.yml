name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

      # App env
      DATABASE_URL: postgresql://pimv_user:strongpassword@localhost:5432/pimv_db_test
      PINATA_JWT: test-pinata-jwt-placeholder
      PRIVATE_KEY: "0x59c6995e998f97a5a0044976f8d1c1d2b5e7c6fbeae2c0e8bcbf5f3e6b8c9d12"

      # Defensive: ensure no accidental chain access
      PROVIDER_URL: http://127.0.0.1:8545
      HYBRID_MODE: "true"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pimv_user
          POSTGRES_PASSWORD: strongpassword
          POSTGRES_DB: pimv_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pimv_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ───────────────────────────────
      # Checkout
      # ───────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5

      # ───────────────────────────────
      # Node + Yarn with Corepack
      # ───────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: |
            backend/yarn.lock
            frontend/yarn.lock

      - name: Enable Corepack
        run: |
          corepack enable
          # Verify corepack is working
          which yarn
          yarn --version

      # ───────────────────────────────
      # Install dependencies
      # ───────────────────────────────
      - name: Install dependencies
        run: |
          # Use yarn directly - corepack will route to the correct version
          yarn install --immutable
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false  # Helps with some CI environments
      
      # ───────────────────────────────
      # Initialize database schema
      # ───────────────────────────────
      - name: Initialize database schema
        run: |
          psql "$DATABASE_URL" -f backend/db/schema.sql
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # ───────────────────────────────
      # Backend Jest tests (CI mode)
      # ───────────────────────────────
      - name: Run backend Jest tests
        working-directory: backend
        run: yarn test:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      # ───────────────────────────────
      # Coverage upload
      # ───────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          fail_ci_if_error: false

      # ───────────────────────────────
      # Frontend build (optional)
      # ───────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: yarn ng build --configuration production