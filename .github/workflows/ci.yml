name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

      # App env
      DATABASE_URL: postgresql://pimv_user:strongpassword@localhost:5432/pimv_db_test
      PINATA_JWT: test-pinata-jwt-placeholder
      PRIVATE_KEY: "0x59c6995e998f97a5a0044976f8d1c1d2b5e7c6fbeae2c0e8bcbf5f3e6b8c9d12"

      # Defensive: ensure no accidental chain access
      PROVIDER_URL: http://127.0.0.1:8545
      HYBRID_MODE: "true"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pimv_user
          POSTGRES_PASSWORD: strongpassword
          POSTGRES_DB: pimv_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pimv_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ───────────────────────────────
      # Checkout
      # ───────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v5

      # ───────────────────────────────
      # Node + Corepack (Yarn 4)
      # ───────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Enable Corepack + install Yarn from packageManager
        run: |
          corepack enable
          corepack install

      - name: Verify Yarn version
        run: yarn --version

      # ───────────────────────────────
      # Cache (Yarn 4 native)
      # ───────────────────────────────
      - name: Get Yarn cache directory
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      # ───────────────────────────────
      # Install deps
      # ───────────────────────────────
      - name: Install dependencies
        run: yarn install --immutable

      # ───────────────────────────────
      # Wait for Postgres (extra safety)
      # ───────────────────────────────
      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U pimv_user && break
            sleep 2
          done

      # ───────────────────────────────
      # Initialize database schema
      # ───────────────────────────────
      - name: Initialize database schema
        run: psql "$DATABASE_URL" -f backend/db/schema.sql

      # ───────────────────────────────
      # Backend tests
      # ───────────────────────────────
      - name: Run backend Jest tests
        working-directory: backend
        run: yarn test:ci

      # ───────────────────────────────
      # Coverage
      # ───────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          fail_ci_if_error: false

      # ───────────────────────────────
      # Frontend build
      # ───────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: yarn ng build --configuration production