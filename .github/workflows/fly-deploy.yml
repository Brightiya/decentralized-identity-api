name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  # Optional: also trigger on manual dispatch (useful for testing)
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true   # ← recommended: cancel old runs when new push comes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy application
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Optional: show deployment URL / status at the end
      - name: Show deployment info
        run: |
          echo "Deployment finished."
          echo "App URL: https://$(flyctl status --json | jq -r .Hostname)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}